    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'JetBrains Mono', 'Consolas', 'Courier New', monospace;
            padding: 20px;
        }

        .scanline {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
            );
            z-index: 1000;
        }

        .terminal {
            background: #0c0c1d;
            border: 1px solid #333;
            border-radius: 10px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 0 60px rgba(0,255,65,0.07), 0 0 100px rgba(0,255,65,0.03);
            overflow: hidden;
        }

        .terminal-header {
            background: #1a1a2e;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #292940;
            user-select: none;
        }

        .dots { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-r { background: #ff5f57; }
        .dot-y { background: #febc2e; }
        .dot-g { background: #28c840; }
        .terminal-title { color: #666; font-size: 12px; flex: 1; text-align: center; }

        .terminal-body {
            padding: 24px;
            color: #00ff41;
            font-size: 13px;
            line-height: 1.7;
        }

        .ascii {
            color: #00ff41;
            font-size: 10px;
            line-height: 1.15;
            margin-bottom: 16px;
            white-space: pre;
            opacity: 0.85;
        }

        .sep { color: #333; margin: 10px 0; user-select: none; }
        .prompt { color: #00ff41; }
        .prompt::before { content: '\276F '; color: #555; }
        .dim { color: #555; }
        .note { color: #444; font-size: 11px; font-style: italic; }

        .toggle-row {
            display: flex;
            gap: 8px;
            margin: 12px 0;
            flex-wrap: wrap;
        }

        .btn {
            background: transparent;
            border: 1px solid #00ff41;
            color: #00ff41;
            font-family: inherit;
            font-size: 12px;
            padding: 5px 12px;
            cursor: pointer;
            transition: all 0.15s;
            border-radius: 2px;
        }
        .btn:hover { background: rgba(0,255,65,0.08); }
        .btn.active {
            background: #00ff41;
            color: #0c0c1d;
            font-weight: bold;
        }

        .tier {
            margin: 5px 0;
            padding: 9px 14px;
            border-left: 3px solid transparent;
            opacity: 0;
            transform: translateX(-8px);
            animation: slideIn 0.35s ease forwards;
            border-radius: 0 4px 4px 0;
            background: rgba(255,255,255,0.01);
            transition: background 0.3s;
        }
        .tier:hover { background: rgba(255,255,255,0.03); }
        .tier.highlight {
            background: rgba(0,255,65,0.08);
            box-shadow: 0 0 12px rgba(0,255,65,0.05);
        }

        @keyframes slideIn { to { opacity: 1; transform: translateX(0); } }

        .t1 { border-left-color: #ff5f57; }
        .t2 { border-left-color: #ff8c00; }
        .t3 { border-left-color: #febc2e; }
        .t4 { border-left-color: #28c840; }
        .t5 { border-left-color: #00bfff; }

        .tier-range { color: #febc2e; font-weight: bold; font-size: 13px; }
        .tier-desc { color: #aaa; font-size: 12px; margin-top: 2px; }
        .tier-desc::before { content: '\2192 '; color: #555; }

        .input-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .input-row label { color: #555; font-size: 13px; }

        .salary-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            color: #00ff41;
            font-family: inherit;
            font-size: 14px;
            padding: 4px 2px;
            width: 220px;
            outline: none;
            caret-color: #00ff41;
        }
        .salary-input::placeholder { color: #333; }
        .salary-input:focus { border-bottom-color: #00ff41; }

        .result { margin-top: 8px; padding: 8px 0; font-size: 13px; min-height: 24px; }
        .result-text { color: #00ff41; }

        .cursor-blink {
            display: inline-block;
            width: 8px;
            height: 14px;
            background: #00ff41;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .footer { color: #333; font-size: 11px; margin-top: 16px; }

        @media (max-width: 600px) {
            .terminal-body { padding: 14px; font-size: 12px; }
            .ascii { font-size: 6px; }
            .tier-range { font-size: 11px; }
            .tier-desc { font-size: 10px; }
            .salary-input { width: 150px; }
            .btn { font-size: 11px; padding: 4px 8px; }
        }
    </style>
</head>

// --- platform detection ---
function detectPlatform() {
    const ua = navigator.userAgent || '';
    if (/Linux/i.test(ua) && !/Android/i.test(ua)) return { name: 'Linux', div: 4, icon: '\uD83D\uDC27' };
    if (/Android/i.test(ua))                        return { name: 'Android', div: 3, icon: '\uD83E\uDD16' };
    if (/Windows/i.test(ua))                        return { name: 'Windows', div: 3, icon: '\uD83E\uDE9F' };
    return { name: 'Apple', div: 1, icon: '\uD83C\uDF4F' };
}
const PLATFORM = detectPlatform();

function fmtNum(v, d) {
    return v.toLocaleString(d.locale);
}

function fmtVal(v, d) {
    return d.pre ? d.sym + fmtNum(v, d) : fmtNum(v, d) + ' ' + d.sym;
}

function getTiers(d) {
    const div = PLATFORM.div;
    const thresholds = d.base.map(v => Math.round(v / div));
    const cls = ['t1','t2','t3','t4','t5'];
    const tiers = [];
    for (let i = 0; i < 5; i++) {
        let range;
        if (i === 0) {
            range = 'x < ' + fmtVal(thresholds[0], d);
        } else if (i < 4) {
            range = fmtVal(thresholds[i-1], d) + ' < x < ' + fmtVal(thresholds[i], d);
        } else {
            range = 'x > ' + fmtVal(thresholds[3], d);
        }
        tiers.push({ max: i < 4 ? thresholds[i] : Infinity, range, desc: d.descs[i], c: cls[i] });
    }
    return tiers;
}

</div>
<div class="result" id="res"></div>
<div class="footer">salary.exe v4.0 \u00B7 \u0436\u0438\u0437\u043D\u0435\u043D\u043D\u0430\u044F \u043F\u0440\u0430\u0432\u0434\u0430<span class="cursor-blink"></span></div>`;

    document.getElementById('sal').addEventListener('input', check);
    document.getElementById('sal').addEventListener('keyup', function(e) { if (e.key === 'Enter') check(); });
}

function check() {
    const raw = document.getElementById('sal').value.replace(/[^0-9]/g, '');
    const val = parseInt(raw, 10);
    const res = document.getElementById('res');
    const tierEls = document.querySelectorAll('.tier');
    tierEls.forEach(el => el.classList.remove('highlight'));
    if (isNaN(val)) { res.innerHTML = ''; return; }

    const d = DATA[loc];
    const tiers = getTiers(d);
    let found = tiers.length - 1;
    for (let i = 0; i < tiers.length; i++) {
        if (val < tiers[i].max) { found = i; break; }
    }
    tierEls[found]?.classList.add('highlight');

    const icons = ['\u2620\uFE0F','\uD83D\uDE10','\uD83D\uDE42','\uD83D\uDE0E','\uD83C\uDFC6'];
    const formatted = fmtVal(val, d) + (d.unit.includes('/') ? '/' + d.unit.split('/')[1] : '');
    res.innerHTML = `<span class="result-text">${icons[found]} ${formatted} \u2014 ${tiers[found].desc}</span>`;
}

render();
</script>
</body>
</html>
